<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll-Driven Hero</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <section class="hero-canvas">
      <div class="sticky-container">
        <h1 id="headline">
          <span>W</span>
          <span>E</span>
          <span>L</span>
          <span>C</span>
          <span>O</span>
          <span>M</span>
          <span>E</span>
          <span>I</span>
          <span>T</span>
          <span>Z</span>
          <span>F</span>
          <span>I</span>
          <span>Z</span>
          <span>Z</span>
        </h1>

        <div id="car-wrapper">
          <img src="car.png" alt="Hero Car" class="car-img" />
        </div>

        <div id="stats-grid" class="stats-container"></div>
      </div>
    </section>

    <section class="footer-spacer">
      <h2>END OF SECTION</h2>
    </section>

    <script src="main.js"></script>
  </body>
</html>
